site_name: Tad Code
theme:
  name: material
  logo: assets/logo/cat_white.png
  text: PrimaryFont
  code: CodeFont
  custom_dir: custom_theme
  highlightjs: true
  hljs_style: github
  hljs_style_dark: github-dark
  palette:
  - scheme: default
    primary: indigo
    accent: pink
    toggle:
      icon: material/brightness-4
      name: Switch to dark mode
  - scheme: slate
    primary: indigo
    accent: pink
    toggle:
      icon: material/brightness-7
      name: Switch to light mode
  features:
    - content.code.annotation
    - content.code.copy
    - content.tabs.link
    - navigation.tabs
    - navigation.instant
    - navigation.footer
    - navigation.tracking

plugins:
  - search:
      lang: vi
  - plantuml:
      # puml_url: https://www.plantuml.com/plantuml/
      puml_url: http://localhost:8080/
  - graph
  - macros

